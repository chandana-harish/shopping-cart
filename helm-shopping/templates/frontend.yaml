apiVersion: apps/v1 
kind: Deployment 
metadata:
  name: frontend-deployment 
  namespace: sp 
spec:
  replicas: 1
  strategy:
    type: RollingUpdate 
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector: 
    matchLabels:
      app: shop  
  templates:
    metadata:
      labels:
        app: shop 
    spec:
      containers:
        - name: shopping-cont 
          image:
          port: 8080 
          resources:
            requests:
              cpu: "100m"
              memory: "250Mi" 
            limits:
              cpu: "200m" 
              memory: "400Mi" 
          
  
  
  
